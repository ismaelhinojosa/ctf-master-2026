<head>

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #05040d;
            --neon-pink: #ec4899;
            --neon-cyan: #06b6d4;
            --text-primary: #f3f4f6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Scanlines */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 5;
            padding: 30px;
            max-width: 600px;
            background: rgba(15, 8, 28, 0.8);
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 35px rgba(236, 72, 153, 0.3);
            border-radius: 12px;
            animation: shake 0.5s ease-in-out;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-pink);
            text-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
            font-size: 1.8rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #c084fc;
            margin-bottom: 30px;
        }

        .troll-image {
            width: 100%;
            max-width: 320px;
            border-radius: 8px;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
            margin-bottom: 25px;
        }

        .btn {
            background: linear-gradient(135deg, var(--neon-pink), #b91c1c);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.3);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--neon-pink);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-10px);
            }

            40%,
            80% {
                transform: translateX(10px);
            }
        }
    </style>
</head>

        <div>
            <a href="troll_hacker.png" download="regalito_de_ismael.png" class="btn"> Descargar mi Premio</a>
        </div>
    </div>

</body>
