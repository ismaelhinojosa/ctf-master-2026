<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF Ciberseguridad - Terminal</title>
    <!-- 🔐 HONEYPOT 1: Clave maestra en comentario (¡que no se caiga!) 🔐 -->
    <!-- ADMIN_BACKDOOR: MasterCiberSeguridad2026! | EXPLOIT_DETECTED -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            overflow: hidden;
            min-height: 100vh;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 255, 0, 0.03) 0px,
                    rgba(0, 255, 0, 0.03) 1px,
                    transparent 1px,
                    transparent 2px
                );
        }

        .terminal-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            background-color: #0a0a0a;
        }

        .terminal-header {
            border-bottom: 2px solid #00ff00;
            padding-bottom: 15px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: flicker 3s infinite;
        }

        .terminal-header h1 {
            font-size: 20px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #00ff00;
        }

        .terminal-header p {
            font-size: 11px;
            color: #00aa00;
            opacity: 0.8;
        }

        .output-container {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 10px;
            background-color: rgba(0, 10, 10, 0.8);
            border: 1px solid #003300;
        }

        .output-line {
            margin-bottom: 8px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .command {
            color: #00ff00;
            font-weight: bold;
            margin-top: 5px;
        }

        .response {
            color: #00ff00;
            margin-left: 10px;
        }

        .error {
            color: #ff3333;
            font-weight: bold;
        }

        .success {
            color: #00ff00;
            font-weight: bold;
            text-shadow: 0 0 5px #00ff00;
        }

        .warning {
            color: #ffaa00;
            font-weight: bold;
        }

        .input-line {
            display: flex;
            align-items: center;
            border-top: 1px solid #003300;
            padding-top: 10px;
        }

        .prompt {
            color: #00ff00;
            font-weight: bold;
            margin-right: 8px;
            white-space: nowrap;
        }

        #command-input {
            flex: 1;
            background-color: transparent;
            border: none;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            caret-color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
        }

        #command-input::placeholder {
            color: #003300;
        }

        /* Scrollbar personalizada */
        .output-container::-webkit-scrollbar {
            width: 8px;
        }

        .output-container::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .output-container::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 4px;
        }

        .output-container::-webkit-scrollbar-thumb:hover {
            background: #00aa00;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 5px #00ff00;
            }
            50% {
                text-shadow: 0 0 20px #00ff00;
            }
        }

        .glowing {
            animation: glow 1.5s infinite;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .terminal-container {
                padding: 10px;
                font-size: 12px;
            }
            
            .terminal-header h1 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <h1>⚡ CTF CIBERSEGURIDAD MASTER ⚡</h1>
            <p>Sistema de Decodificación Encriptado | Terminal v2.1</p>
        </div>

        <div class="output-container" id="output">
            <div class="output-line">
                <span class="response">Bienvenido al sistema de desencriptación personalizada.</span>
            </div>
            <div class="output-line">
                <span class="response">Escribe <span class="command">help</span> para ver los comandos disponibles.</span>
            </div>
            <div class="output-line">
                <span class="response">⚠️ Solo usuarios autenticados pueden acceder a los mensajes secretos.</span>
            </div>
        </div>

        <div class="input-line">
            <span class="prompt">guest@ciberseguridad-ctf:~$</span>
            <input type="text" id="command-input" placeholder="Introduce un comando..." autocomplete="off">
        </div>
    </div>

    <!-- CryptoJS desde CDN (versión estable) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
